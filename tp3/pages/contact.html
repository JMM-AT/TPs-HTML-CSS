<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Entreprise Web</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
<h1>Entreprise Web</h1>
<nav>
<ul>
<li><a href="../index.html">Accueil</a></li>
<li><a href="about.html">À propos</a></li>
<li><a href="service.html">Services</a></li>
<li><a href="gallery.html">Galerie</a></li>
<li><a href="contact.html" class="active">Contact</a></li>
</ul>
</nav>
</header>

<main>
<section>
<div class="page-header">
  <p>Discutons ensemble</p>
  <h2>Contactez-nous</h2>
</div>

<div class="contact-container">
  <div class="contact-info">
    <form class="contact-form">
      <label>Nom complet</label>
      <input type="text" placeholder="John Doe" required>
      
      <label>Email professionnel</label>
      <input type="email" placeholder="john@entreprise.com" required>
      
      <label>Téléphone</label>
      <input type="tel" placeholder="+33 6 00 00 00 00">
      
      <label>Sujet de la demande</label>
      <select>
        <option>Création de site</option>
        <option>Support technique</option>
        <option>Design UI/UX</option>
        <option>Autre information</option>
      </select>
      
      <label>Votre message</label>
      <textarea placeholder="Décrivez votre projet ici..."></textarea>
      
      <input type="submit" value="Envoyer la demande">
    </form>
  </div>
  
  <div class="map-container">
    <iframe
      src="https://maps.google.com/maps?q=casablanca&t=&z=13&ie=UTF8&iwloc=&output=embed"
      loading="lazy">
    </iframe>
  </div>
</div>
</section>
</main>

<footer>
<h3>Plan du site</h3>
<ul>
<li><a href="../index.html">Accueil</a></li>
<li><a href="about.html">À propos</a></li>

<li><a href="gallery.html">Galerie</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
<p>Entreprise Web. </p>
</footer>
</body>
</html>
