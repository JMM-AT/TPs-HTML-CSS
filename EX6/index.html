    <h1>EXERCICE 6:</h1>
    <h2>6.1 Système de couleurs</h2>
    <p>Créez un système de variables CSS pour un thème clair et sombre :</p>
    <textarea class="code-editor" rows="10" readonly>
        :root {
            --text-color: #333333;
            --bg-color: #ffffff;
            --color-primary: #3498db;
            --color-secondary: #2ecc71;
            --border-color: #dddddd;
        }
        [data-theme="dark"] {
            --text-color: #ffffff;
            --bg-color: #333333;
            --color-primary: #2980b9;
            --color-secondary: #27ae60;
            --border-color: #555555;
        }
    </textarea>
